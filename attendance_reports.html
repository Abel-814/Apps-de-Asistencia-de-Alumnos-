<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        /* Custom styles for select arrow */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2220%22%20height%3D%2220%22%20fill%3D%22%236B7280%22%3E%3Cpath%20d%3D%22M5.293%207.293a1%201%200%20011.414%200L10%2010.586l3.293-3.293a1%201%200%20111.414%201.414l-4%204a1%201%200%2001-1.414%200l-4-4a1%201%200%20010-1.414z%22%20clip-rule%3D%22evenodd%22%20fill-rule%3D%22evenodd%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1.25em 1.25em;
            padding-right: 2.5rem; /* Adjust as needed */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Top Navigation -->
    <div class="bg-white shadow-md">
        <div class="max-w-md mx-auto px-4 py-3 flex items-center">
            <button class="text-gray-600 hover:text-gray-800 mr-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-semibold text-gray-700">Attendance Reports</h1>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-md mx-auto px-4 py-6">
        <!-- Filter Section -->
        <div class="mb-6 bg-white p-4 rounded-lg shadow">
            <h2 class="text-md font-semibold text-gray-700 mb-3">Filter</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="class" class="block text-sm font-medium text-gray-600 mb-1">Class</label>
                    <select id="class" name="class" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Class 10A</option>
                        <option>Class 10B</option>
                    </select>
                </div>
                <div>
                    <label for="month" class="block text-sm font-medium text-gray-600 mb-1">Month</label>
                    <select id="month" name="month" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option>January</option>
                        <option>February</option>
                        <option selected>March</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Attendance Summary -->
        <div class="mb-6 bg-white p-4 rounded-lg shadow text-center">
            <h2 class="text-md font-semibold text-gray-700 mb-2">Attendance Summary</h2>
            <div class="text-4xl font-bold text-green-500 mb-1">95%</div>
            <p class="text-sm text-gray-600">Overall Attendance</p>
        </div>

        <!-- Attendance Details -->
        <div class="mb-6 bg-white p-4 rounded-lg shadow">
            <h2 class="text-md font-semibold text-gray-700 mb-3">Attendance Details</h2>
            <div class="space-y-2">
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-md">
                    <span class="text-gray-700">Present</span>
                    <span class="font-semibold text-green-600">190</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-md">
                    <span class="text-gray-700">Absent</span>
                    <span class="font-semibold text-red-600">8</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-md">
                    <span class="text-gray-700">Late</span>
                    <span class="font-semibold text-yellow-600">2</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Button -->
    <div class="max-w-md mx-auto px-4 pb-6 pt-2">
        <button class="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 flex items-center justify-center">
             <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Export Report
        </button>
    </div>

</body>
</html>
