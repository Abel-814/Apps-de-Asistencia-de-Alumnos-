<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Top Navigation -->
    <div class="bg-white shadow-md">
        <div class="max-w-md mx-auto px-4 py-3 flex items-center">
            <button class="text-gray-600 hover:text-gray-800 mr-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-semibold text-gray-700">Groups</h1>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-md mx-auto px-4 py-6">
        <!-- Grade 1 -->
        <div class="mb-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-2">Grade 1</h2>
            <div class="bg-white rounded-lg shadow">
                <a href="#" class="flex justify-between items-center p-4 border-b hover:bg-gray-50">
                    <span class="text-gray-800">Section A</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
                <a href="#" class="flex justify-between items-center p-4 hover:bg-gray-50">
                    <span class="text-gray-800">Section B</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </div>
        </div>

        <!-- Grade 2 -->
        <div class="mb-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-2">Grade 2</h2>
            <div class="bg-white rounded-lg shadow">
                <a href="#" class="flex justify-between items-center p-4 border-b hover:bg-gray-50">
                    <span class="text-gray-800">Section A</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
                <a href="#" class="flex justify-between items-center p-4 hover:bg-gray-50">
                    <span class="text-gray-800">Section B</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </div>
        </div>
         <!-- Grade 3 (Example, can be repeated) -->
        <div class="mb-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-2">Grade 3</h2>
            <div class="bg-white rounded-lg shadow">
                <a href="#" class="flex justify-between items-center p-4 hover:bg-gray-50">
                    <span class="text-gray-800">Section A</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="fixed bottom-6 right-6 bg-blue-600 text-white p-4 rounded-full shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
    </button>

</body>
</html>
