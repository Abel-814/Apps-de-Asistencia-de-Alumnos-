<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .active-tab {
            border-bottom-width: 2px;
            border-color: #4F46E5; /* indigo-600 */
            color: #4F46E5; /* indigo-600 */
        }
        .active-nav {
            color: #4F46E5; /* indigo-600 */
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Top Navigation -->
    <div class="bg-white shadow-md">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-semibold text-gray-700">Attendance</h1>
            <button class="text-gray-600 hover:text-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="bg-white shadow-sm">
        <div class="max-w-md mx-auto flex justify-around">
            <button class="py-3 px-4 text-sm font-medium text-gray-500 hover:text-gray-700 active-tab">Today</button>
            <button class="py-3 px-4 text-sm font-medium text-gray-500 hover:text-gray-700">Upcoming</button>
            <button class="py-3 px-4 text-sm font-medium text-gray-500 hover:text-gray-700">Past</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow max-w-md mx-auto w-full px-4 py-6">
        <h2 class="text-lg font-semibold text-gray-700 mb-4">Today</h2>
        <div class="space-y-4">
            <div class="bg-white p-4 rounded-lg shadow">
                <p class="font-medium text-gray-800">8:00 AM - 9:00 AM</p>
                <p class="text-gray-600">Math 101</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <p class="font-medium text-gray-800">9:30 AM - 10:30 AM</p>
                <p class="text-gray-600">History 202</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <p class="font-medium text-gray-800">11:00 AM - 12:00 PM</p>
                <p class="text-gray-600">Physics Lab</p>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-white shadow-t border-t">
        <div class="flex justify-around max-w-md mx-auto">
            <a href="#" class="flex flex-col items-center text-gray-600 hover:text-indigo-600 p-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-xs">Home</span>
            </a>
            <a href="#" class="flex flex-col items-center text-indigo-600 hover:text-indigo-600 p-3 active-nav">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path><path d="M0 0h24v24H0z" fill="none"></path><path d="M12 14c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4zm-6.75 2.5c.2-.4.52-.75.88-1h11.74c.36.25.68.6.88 1zM4.34 17h15.32c-.4-.81-1.04-1.52-1.83-2H6.17c-.79.48-1.43 1.19-1.83 2zM12 6c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2m0-2C9.24 4 7 6.24 7 9s2.24 5 5 5 5-2.24 5-5S14.76 4 12 4z"></path></svg>
                <span class="text-xs">Attendance</span>
            </a>
            <a href="#" class="flex flex-col items-center text-gray-600 hover:text-indigo-600 p-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-xs">Schedule</span>
            </a>
            <a href="#" class="flex flex-col items-center text-gray-600 hover:text-indigo-600 p-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-xs">Profile</span>
            </a>
        </div>
    </div>

</body>
</html>
