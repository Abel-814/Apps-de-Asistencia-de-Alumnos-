<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .status-present { color: #10B981; /* Emerald-500 */ }
        .status-absent { color: #EF4444; /* Red-500 */ }
        .status-late { color: #F59E0B; /* Amber-500 */ }
        .status-excused { color: #6B7280; /* Gray-500 */ }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Top Navigation -->
    <div class="bg-white shadow-md">
        <div class="max-w-md mx-auto px-4 py-3 flex items-center">
            <button class="text-gray-600 hover:text-gray-800 mr-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-semibold text-gray-700">Attendance</h1>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-md mx-auto px-4 py-6">
        <h2 class="text-lg font-semibold text-gray-700 mb-4 text-center">Class 10A</h2>

        <div class="bg-white rounded-lg shadow">
            <!-- Student List Item -->
            <div class="flex items-center justify-between p-4 border-b">
                <div class="flex items-center">
                    <img src="https://via.placeholder.com/40" alt="Profile" class="w-10 h-10 rounded-full mr-3">
                    <span class="text-gray-800 font-medium">John Doe</span>
                </div>
                <span class="text-sm font-semibold status-present">Present</span>
            </div>
            <!-- Student List Item -->
            <div class="flex items-center justify-between p-4 border-b">
                <div class="flex items-center">
                    <img src="https://via.placeholder.com/40" alt="Profile" class="w-10 h-10 rounded-full mr-3">
                    <span class="text-gray-800 font-medium">Jane Smith</span>
                </div>
                <span class="text-sm font-semibold status-absent">Absent</span>
            </div>
            <!-- Student List Item -->
            <div class="flex items-center justify-between p-4 border-b">
                <div class="flex items-center">
                    <img src="https://via.placeholder.com/40" alt="Profile" class="w-10 h-10 rounded-full mr-3">
                    <span class="text-gray-800 font-medium">Mike Johnson</span>
                </div>
                <span class="text-sm font-semibold status-late">Late</span>
            </div>
            <!-- Student List Item -->
            <div class="flex items-center justify-between p-4 border-b">
                <div class="flex items-center">
                    <img src="https://via.placeholder.com/40" alt="Profile" class="w-10 h-10 rounded-full mr-3">
                    <span class="text-gray-800 font-medium">Emily Davis</span>
                </div>
                <span class="text-sm font-semibold status-excused">Excused</span>
            </div>
             <!-- Student List Item -->
            <div class="flex items-center justify-between p-4">
                <div class="flex items-center">
                    <img src="https://via.placeholder.com/40" alt="Profile" class="w-10 h-10 rounded-full mr-3">
                    <span class="text-gray-800 font-medium">Chris Lee</span>
                </div>
                <span class="text-sm font-semibold status-present">Present</span>
            </div>
        </div>
    </div>

    <!-- Bottom Button -->
    <div class="max-w-md mx-auto px-4 pb-6 pt-2">
        <button class="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 flex items-center justify-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h-1m-2-11h1M4 12H3m11 6v-1m-2 11v-1M4 16v1m11-2h-1M7 4H6m11 4h1M4 7H3m11 11h1M7 20H6"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h10v10H7z"></path></svg>
            Scan QR Code
        </button>
    </div>

</body>
</html>
